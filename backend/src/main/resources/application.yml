spring:
  application:
    name: credora-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/credora}
    username: ${DATABASE_USER:credora}
    password: ${DATABASE_PASSWORD:credora}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

credora:
  jwt:
    secret: ${JWT_SECRET:credora-dev-secret-change-in-production-min-32-chars}
    expiration-ms: 86400000
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  credit-bureau:
    mode: ${CREDIT_BUREAU_MODE:sandbox}
  sms:
    mode: ${SMS_MODE:sandbox}

logging:
  level:
    com.credora: INFO
